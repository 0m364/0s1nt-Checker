{% extends "layout.html" %}
{% block content %}
<h1>Cases</h1>
<table>
    <tr>
        <th>Case ID</th>
        <th>Status</th>
        <th>Created</th>
        <th>Actions</th>
    </tr>
    {% for case in cases %}
    <tr>
        <td>{{ case.id }}</td>
        <td>{{ case.status }}</td>
        <td>{{ case.created_at }}</td>
        <td><a class="btn" href="/cases/{{ case.id }}">View</a></td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

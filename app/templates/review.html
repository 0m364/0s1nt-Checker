{% extends "layout.html" %}
{% block content %}
<h1>Review Case: {{ case.id }}</h1>
<form method="post" action="/cases/{{ case.id }}/review">
    <p>Reviewer: <input type="text" name="reviewer_name" required></p>
    <p>Decision:
        <select name="decision">
            <option value="approve">Approve</option>
            <option value="reject">Reject</option>
        </select>
    </p>
    <p><input type="submit" value="Submit Review"></p>
</form>
{% endblock %}

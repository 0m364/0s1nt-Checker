<!DOCTYPE html>
<html>
<head>
    <title>OSINT Threat Scanner</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; text-decoration: none; border: 1px solid #ccc; background: #eee; color: #000; }
        .popup {
            display: none; position: fixed; left: 50%; top: 50%;
            transform: translate(-50%, -50%); border: 1px solid #000;
            background: #fff; padding: 20px; z-index: 1000;
            max-width: 600px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .popup-overlay {
            display: none; position: fixed; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;
        }
        .popup-close { float: right; cursor: pointer; color: red; }
    </style>
</head>
<body>
    <nav>
        <a href="/cases">Cases</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
